<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#0F0C09"/>

  <!-- Stylized rose petals -->
  <!-- Center -->
  <circle cx="32" cy="30" r="5" fill="#9B1B30"/>
  <!-- Petal top -->
  <ellipse cx="32" cy="20" rx="5" ry="7" fill="#B8202E" opacity="0.9"/>
  <!-- Petal bottom -->
  <ellipse cx="32" cy="40" rx="5" ry="7" fill="#B8202E" opacity="0.9"/>
  <!-- Petal left -->
  <ellipse cx="22" cy="30" rx="7" ry="5" fill="#9B1B30" opacity="0.85"/>
  <!-- Petal right -->
  <ellipse cx="42" cy="30" rx="7" ry="5" fill="#9B1B30" opacity="0.85"/>
  <!-- Diagonal petals -->
  <ellipse cx="25" cy="23" rx="4.5" ry="6.5" fill="#B8202E" opacity="0.7" transform="rotate(-45 25 23)"/>
  <ellipse cx="39" cy="23" rx="4.5" ry="6.5" fill="#B8202E" opacity="0.7" transform="rotate(45 39 23)"/>
  <ellipse cx="25" cy="37" rx="4.5" ry="6.5" fill="#9B1B30" opacity="0.7" transform="rotate(45 25 37)"/>
  <ellipse cx="39" cy="37" rx="4.5" ry="6.5" fill="#9B1B30" opacity="0.7" transform="rotate(-45 39 37)"/>
  <!-- Center highlight -->
  <circle cx="32" cy="30" r="3.5" fill="#D4485A"/>
  <circle cx="31" cy="29" r="1.2" fill="#E8CFC8" opacity="0.6"/>

  <!-- Stem -->
  <rect x="31" y="45" width="2" height="11" rx="1" fill="#4A7C59"/>
  <!-- Leaf -->
  <ellipse cx="28" cy="51" rx="5" ry="2.5" fill="#4A7C59" opacity="0.85" transform="rotate(-30 28 51)"/>
</svg>
